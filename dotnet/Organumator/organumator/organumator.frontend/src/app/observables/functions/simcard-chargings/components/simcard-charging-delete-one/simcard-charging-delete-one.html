@if (!confirming) {
  <button mat-icon-button color="warn" (click)="requestDelete()"><mat-icon>delete</mat-icon></button>
} @else {
  <button mat-icon-button color="warn" (click)="confirmDelete()"><mat-icon>check</mat-icon></button>
  <button mat-icon-button (click)="cancelDelete()"><mat-icon>close</mat-icon></button>
}
