<button mat-button (click)="refresh()">Refresh</button>

<mat-table [dataSource]="(days$ | async) ?? []">
  <ng-container matColumnDef="date">
    <mat-header-cell *matHeaderCellDef>Date</mat-header-cell>
    <mat-cell *matCellDef="let item">{{ item.date | date:'fullDate' }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="count">
    <mat-header-cell *matHeaderCellDef>Count</mat-header-cell>
    <mat-cell *matCellDef="let item">{{ item.count }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="duration">
    <mat-header-cell *matHeaderCellDef>Total Duration</mat-header-cell>
    <mat-cell *matCellDef="let item">{{ formatDuration(item.totalDurationSeconds) }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="actions">
    <mat-header-cell *matHeaderCellDef></mat-header-cell>
    <mat-cell *matCellDef="let item">
      <button mat-icon-button color="warn" (click)="$event.stopPropagation(); deleteDay(item.date)">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-cell>
  </ng-container>

  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: displayedColumns;" (click)="goToList(row.date)" style="cursor: pointer;"></mat-row>
</mat-table>
